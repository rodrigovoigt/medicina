<script>
var ALL = [
  {n:1,tags:["Indicacoes de revascularizacao"],q:"Homem de 66 anos, diabetico, portador de coronariopatia obstrutiva e doenca arterial obstrutiva periferica, ambas ateroscleroticas, creatinina de 1,4 mg/dl, fracao de ejecao do VE de 30%, com 22% de miocardio isquemico pela cintilografia, lesao de 55% de tronco de arteria coronaria esquerda e obstrutcoes >70% em ramo marginal da circunflexa, descendente anterior proximal, segundo ramo diagonal e porcao distal da coronaria direita dominante. Syntax Score I = 38. Angina classe III (CCS). Qual conduta oferece maior sobrevida em 4 anos?",opts:["Cirurgia de revascularizacao do miocardio.","Tratamento paliativo.","Tratamento medicamentoso otimizado apenas.","Intervencao Coronaria Percutanea."],ans:0},
  {n:2,tags:["Estatinas","Prevencao cardiovascular"],q:"Sobre a prevencao cardiovascular na atencao primaria, e CORRETO afirmar que:",opts:["A aspirina esta indicada para uso continuo na prevencao secundaria de pessoas que sofreram infarto do miocardio.","O uso das estatinas deve ser iniciado o mais precoce possivel na prevencao primaria, tendo em vista a baixa adesao a mudancas do estilo de vida.","E recomendado o uso de bebida alcoolica em doses superiores a 20g/dia para homens para reduzir o risco cardiovascular.","A realizacao de provas funcionais como o teste de esforco sao uteis no diagnostico precoce de doenca coronariana, devendo ser iniciado a partir dos 20 anos.","A US Preventive Service Task Force e a Sociedade Europeia de Cardiologia recomendam avaliacao sistematica de risco cardiovascular a partir dos 30 anos em pessoas sem fatores de risco."],ans:0},
  {n:3,tags:["Manejo da angina estavel"],q:"Sobre o manejo da angina estavel, assinale a alternativa CORRETA:",opts:["AAS, estatinas e nitratos sao drogas que, comprovadamente, reduzem mortalidade.","Angina, na presenca de sintomas de insuficiencia cardiaca congestiva, e indicacao de cineangiocoronariografia.","A revascularizacao miocardica e imprescindivel para o aumento de sobrevida no paciente com angina estavel.","No paciente com dislipidemia e diabetes mellitus associados, o alvo e LDLc < 130 mg/dl."],ans:1},
  {n:4,tags:["Cessacao do tabagismo"],q:"Paciente de 65 anos, tabagista, com HAS, DPOC e depressao. HGT = 320 mg/dL, PA = 160x110 mmHg.\n\nJulgue: O fumo e um fator de risco totalmente evitavel de doenca e morte cardiovasculares, e seu enfrentamento precisa ser feito.",opts:["Certo.","Errado."],ans:0},
  {n:5,tags:["Indicacoes de revascularizacao"],q:"Mulher, 64 anos, hipertensa e diabetica, angina estavel ha 3 anos em tratamento irregular. Ecocardiograma: funcao biventricular preservada. Coronariografia: lesao triarterial com 40% de obstrucao nas arterias descendente anterior, circunflexa e coronaria direita distal. Qual e o tratamento mais adequado?",opts:["Intervencao coronaria percutanea com stent farmacologico.","Tratamento conservador.","Cirurgia de revascularizacao miocardica.","Intervencao coronaria percutanea com stent de primeira geracao."],ans:1},
  {n:6,tags:["Risco residual"],q:"A droga que tem se mostrado promissora em ensaios clinicos randomizados na reducao do risco residual tanto em paciente com DAC estavel quanto com sindrome coronariana aguda recente e:",opts:["metotrexate.","colchicina.","leflunomida.","infliximabe.","rituximabe."],ans:1},
  {n:7,tags:["Fisiopatologia"],q:"Os mecanismos envolvidos na isquemia perioperatoria dividem-se em duas fases, quais sejam:",opts:["Fenomenos de instabilizacao e ruptura da placa aterosclerotica e os fenomenos de oclusao vascular.","Fenomenos do vasoespasmo coronario e os fenomenos de estabilizacao e ruptura da placa aterosclerotica.","Fenomenos de estabilizacao e ruptura da placa aterosclerotica e os fenomenos de oclusao vascular.","Fenomenos do vasoespasmo coronario e os fenomenos de instabilizacao e ruptura da placa aterosclerotica."],ans:0},
  {n:8,tags:["Cintilografia"],q:"Homem, 46 anos, com dor toracica precordial, aperto ou queimacao que irradia para ambos os ombros, mandibula e membro superior esquerdo. Havera indicacao de cintilografia de perfusao miocardica:",opts:["Para avaliacao das funcoes sistolica e diastolica, de alteracoes da motilidade ventricular, das valvas cardiacas e do pericardio.","Por haver moderada probabilidade de DAC, no caso de cintilografia inconclusiva, e paciente sinomatico com exames normais.","Por haver relato de dor toracica ou suspeita de angina.","Caso tenha havido teste ergometrico inconclusivo por alteracoes eletrocardiograficas previas ou incapacidade de realizar exercicios ate frequencia cardiaca adequada."],ans:3},
  {n:9,tags:["Teste ergometrico"],q:"Homem de 59 anos com desconforto toracico intermitente ha 3 meses. Hipertensao em uso de lisinopril e anlodipino. Teste de esforco com ECG continuo mostrou infradesnivelamento de 2,2 mm em DII, DIII e aVF, alem de desconforto toracico durante o teste. A conduta de escolha e:",opts:["Encaminhar para o departamento de emergencia.","Iniciar aspirina, clopidogrel, atenolol e nitrato.","Solicitar cintilografia miocardica com talio e dipiridamol.","Solicitar angiografia coronariana percutanea.","Solicitar angiotomografia multidector de arterias coronarias."],ans:3},
  {n:10,tags:["Equivalentes isquemicos"],q:"A dor toracica pode nao estar presente durante um episodio de SCA em ate um terco dos casos. E correto que:",opts:["Sintomas denominados equivalentes nao isquemicos normalmente acometem idosos, mulheres e pacientes diabeticos.","Sintomas denominados equivalentes isquemicos normalmente acometem idosos, mulheres e pacientes diabeticos.","Sintomas denominados equivalentes isquemicos nunca acometem idosos, mulheres e pacientes diabeticos.","Sintomas denominados equivalentes isquemicos normalmente acometem somente pacientes diabeticos."],ans:1},
  {n:11,tags:["Probabilidade pre-teste"],q:"Homem de 68 anos, hipertenso, diabetico, dislipidemia ha 20 anos, tabagista ha 40 anos (10 cigarros/dia), com dor precordial aos esforcos que melhora em repouso ha 1 mes. A probabilidade pre-teste de doenca cardiaca isquemica e:",opts:["Alta, mas e necessario realizar o teste ergometrico para a confirmacao do diagnostico.","Moderada, e a realizacao do teste ergometrico e dispensavel para o diagnostico.","Moderada, e o teste ergometrico positivo confirma a suspeita diagnostica.","Alta, e a confirmacao do diagnostico dispensa o teste ergometrico."],ans:3},
  {n:12,tags:["Teste ergometrico","Liberacao para atividade fisica"],q:"Mulher de 61 anos, HAS bem controlada, sem outras comorbidades. ECG de repouso sem alteracoes. Teste ergometrico com comportamento normal da pressao arterial e boa capacidade funcional, porem com uma alteracao identificada no exame. O medico deve:",opts:["Encaminhar para ecocardiograma e estudo eletrofisiologico, alem de nao liberar para atividade nesse momento.","Solicitar ressonancia cardiaca para descartar cardiopatia estrutural e liberar apenas para atividades fisicas em academia, se o resultado for normal.","Fornecer atestado que libera somente para atividades fisicas, apos Holter 24 horas sem alteracoes significativas.","Fornecer atestado que libera para atividades fisicas em academia, pois a alteracao encontrada nao tem relevancia clinica."],ans:3},
  {n:13,tags:["Probabilidade pre-teste"],q:"Mulher de 30 anos, sem fatores de risco para DCI, com dor precordial aos esforcos que melhora em repouso ha 1 mes. Pai faleceu de IAM ha 2 meses. A probabilidade pre-teste de DCI e:",opts:["Baixa, e se o teste ergometrico for positivo nao levara a confirmacao de DCI.","Muito baixa, mas se o teste ergometrico for positivo levara ao diagnostico de DCI.","Moderada, e se o teste ergometrico for negativo tera valor preditivo para afastar a DCI.","Alta, mas se o teste ergometrico for negativo tera pouco valor para o diagnostico de DCI."],ans:0},
  {n:14,tags:["Prevencao secundaria"],q:"Paciente de 58 anos, tabagista, com historico de IAM ha 5 anos e DM2 em uso de metformina. LDL = 192,3 mg/dL; HDL = 32 mg/dL; PA = 165x102 mmHg.\n\nJulgue: Tendo em vista o historico de IAM previo, tambem e recomendado o controle dos fatores de risco como controle glicemico, cessar tabagismo, uso de AAS e estatinas.",opts:["Certo.","Errado."],ans:0},
  {n:15,tags:["ECG","Isquemia"],q:"Paciente com dor toracica aos esforcos, ortopneia e dispneia paroxistica noturna. Ecocardiograma: FE = 24%, diametro diastolico = 65 mm.\n\nJulgue: O eletrocardiograma desse paciente pode apresentar alteracoes isquemicas, como onda plus minus em derivacoes precordiais.",opts:["Certo.","Errado."],ans:0},
  {n:16,tags:["Cateterismo cardiaco"],q:"Mesmo paciente da questao 15 (dor toracica, ortopneia, FE = 24%, acinesia de parede anterior).\n\nJulgue: Na imagem do cateterismo, observa-se lesao em arteria descendente anterior.",opts:["Certo.","Errado."],ans:0},
  {n:17,tags:["Anatomia coronariana"],q:"Em relacao a anatomia das arterias coronarias, e correto afirmar que:",opts:["A arteria circunflexa fornece o ramo agudo marginal.","A arteria coronaria direita origina os ramos diagonais.","A arteria coronaria esquerda da origem a arteria ventricular posterior.","A arteria descendente anterior da origem aos ramos diagonais e septais.","O tronco da arteria coronaria esquerda da origem a arteria aguda marginal."],ans:3},
  {n:18,tags:["Angina pectoris"],q:"Sobre as caracteristicas da angina pectoris, avalie as assertivas:\n\nI - A angina tem padrao crescente-decrescente, dura 20 a 30 minutos e pode irradiar-se para ombros e membros superiores.\nII - Sinal de Levine e a forma como o paciente descreve a dor anginosa, com a mao sobre o esterno, as vezes com o punho cerrado.\nIII - A angina pode ser noturna, provocada por bradicardia episodica, maior oxigenacao noturna e reducao do volume circulante apos deitar.\nIV - Os 'equivalentes' anginosos sao sintomas de isquemia miocardica que nao sejam angina, como dispneia, nauseas, fadiga e desmaio.\n\nEstao corretas as assertivas:",opts:["I e III apenas","II e IV apenas","III e IV apenas","I, II e III apenas","Todas estao corretas"],ans:1},
  {n:19,tags:["Fisiopatologia"],q:"Sobre a fisiopatologia da isquemia miocardica, analise as assertivas:\n\nI - Os principais determinantes do consumo miocardico de oxigenio sao a frequencia cardiaca, a contratilidade miocardica e a tensao da parede miocardica.\nII - Normalmente os vasos intramiocardicos de resistencia demonstram grande capacidade de dilatacao como, por exemplo, no exercicio.\nIII - A maior resistencia ao fluxo coronariano se faz principalmente nos vasos coronarianos epicardicos.\nIV - Alteracoes fisiologicas da pressao arterial nao interferem no fluxo coronariano.\n\nEstao corretas as assertivas:",opts:["I e II apenas.","I e III apenas.","II e IV apenas.","III e IV apenas.","Todas estao corretas."],ans:0},
  {n:20,tags:["Cintilografia miocardica"],q:"A cintilografia de perfusao miocardica de repouso e estresse fisico esta indicada na seguinte situacao:",opts:["Insuficiencia cardiaca descompensada, que nao permita a realizacao do decubito dorsal horizontal para realizacao de cateterismo.","Estenose aortica severa sintomatica, visando diferenciar a dor relacionada a coronariopatia da dor da estenose aortica.","Pacientes com angina instavel, com TIMI Risk elevado (6 de 0-7).","Pacientes sintomaticos ou com ECG sugestivo de isquemia e com probabilidade pre-teste intermediaria ou alta.","Suspeita de pericardite aguda com ECG com supradesnivelamento de ST, evitando procedimento invasivo."],ans:3},
  {n:21,tags:["Drogas antiisquemicas"],q:"Homem, 60 anos, com passado de IAM de parede anterior, dor toracica a grandes esforcos e PA ambulatorial media de 160x100 mmHg. Qual das medicacoes NAO estaria indicada?",opts:["Vasodilatador arterial direto","Beta-bloqueador","Inibidor de IECA","Bloqueador dos canais de calcio nao hidropiridiniico","Espironolactona"],ans:0},
  {n:22,tags:["Epidemiologia","DCV"],q:"Sobre a morbimortalidade cardiovascular em idosos, NAO podemos concordar com a alternativa:",opts:["As mulheres apresentam uma proporcao mais elevada de contrairem alguma doenca do que os homens, 81,2% e 73,1%, respectivamente.","Dentre as doencas relatadas, nao predominaram as Doencas Cardiovasculares (DCV).","Estas doencas constituem, tambem, a principal causa de morte da populacao idosa; 34,2% e 35,2% dos obitos masculinos e femininos, respectivamente.","Entre elas, destacam-se o IAM e os Acidentes Vasculares Encefalicos (AVE)."],ans:1},
  {n:23,tags:["Cirurgia de revascularizacao","Angina instavel"],q:"Mulher, 66 anos, hipertensa e diabetica, admitida com angina instavel ha 3 meses. Clinicamente estavel. FE de VE estimada em 40%. Coronariografia: lesao proximal focal de 80% em arteria interventricular anterior e lesao focal de 70% em 1/3 medio de arteria circunflexa. Qual e a melhor conduta?",opts:["Angioplastia coronariana com stent farmacologico","Tratamento clinico para insuficiencia coronariana","Realizacao de cintilografia miocardica","Administracao de trombolitico IV","Cirurgia de revascularizacao miocardica"],ans:4},
  {n:24,tags:["DAC estavel","Conduta inicial"],q:"Homem, 53 anos, dor precordial aos esforcos ha 1 mes. Ultimo episodio ha 2 horas, ainda presente. Tabagismo 40 macos/ano. FC = 68 bpm, PA = 142x92 mmHg. A CONDUTA INICIAL e:",opts:["Inibidor da ciclo-oxigenase-1 e da glicoproteina IIb/IIIa.","Inibidor da ciclo-oxigenase-2 e do receptor do ADP.","Inibidor da ciclo-oxigenase-1 e do receptor do ADP.","Inibidor da ciclo-oxigenase-2 e da glicoproteina IIb/IIIa."],ans:2},
  {n:25,tags:["Epidemiologia","Mortalidade"],q:"Todos os farmacos abaixo reduzem a mortalidade por doenca arterial coronariana, EXCETO:",opts:["Clopidogrel","Estatinas","Acido acetilsalicilico","Nitrato de acao prolongada","Betabloqueadores"],ans:3},
  {n:26,tags:["Exames complementares","Framingham"],q:"Filho mais velho, 60 anos, hipertenso (PA = 140x78 mmHg), obeso, hipercolesterolemico (LDL = 140 mg/dL, HDL = 50 mg/dL, TG = 150 mg/dL), refere desconforto difuso no peito quando faz esforco, que melhora com repouso. Considerando o escore de Framingham e a estimativa de probabilidade de DAC pelo tipo de angina, sexo e idade, qual e o diagnostico e ha necessidade de exame complementar?",opts:["Angina estavel com alta probabilidade pre-teste; cateterismo indicado.","Angina instavel; cateterismo imediato independente de exames.","Probabilidade intermediaria; apenas tratamento clinico.","Diagnostico excluido clinicamente."],ans:0},
  {n:27,tags:["Cateterismo cardiaco","Teste ergometrico de alto risco"],q:"Paciente com angina usa AAS, atenolol, nitrato, enalapril e atorvastatina. Exame fisico normal, duplo produto controlado. Teste ergometrico: infrdesnivelamento do ST 3,0 mm horizontal em 6 derivacoes, sugestivo com 3 MET, leva 4 minutos de repouso para normalizar. A conduta mais apropriada e:",opts:["Indicar cintilografia do miocardio.","Avaliar fibrose com ressonancia magnetica cardiaca.","Solicitar coronariografia.","Manter o tratamento clinico atual e evitar esforco fisico.","Associar clopidogrel e trimetazidina, alem de trocar atenolol por carvedilol."],ans:2},
  {n:28,tags:["Calcificacao arterial coronariana"],q:"A Calcificacao Arterial Coronariana (CAC) e um marcador de carga de placa aterosclerotica, mas NAO esta associada ao seguinte item:",opts:["A CAC esta associada a eventos cardiovasculares e mortalidade em pacientes com diabetes.","Quando disponivel, a mensuracao da CAC deve ser a modalidade preferida.","A angiotomografia coronaria computadorizada nao deve ser realizada rotineiramente em pacientes assintomaticos.","Pacientes portadores de aneurisma de aorta abdominal apresentam fatores de risco habituais e comorbidades nao associadas ao aneurisma."],ans:3},
  {n:29,tags:["Reserva de fluxo fracionada"],q:"Sobre a reserva de fluxo fracionada (RFF) para guiar a revascularizacao em pacientes com DAC multiarterial, podemos concordar que:",opts:["Guiar o procedimento tratando apenas estenoses fisiologicamente insignificantes, ao inves de guiar pela aparencia angiografica, foi seguro e reduziu o custo e eventos cardiacos adversos a longo prazo.","Guiar o procedimento tratando apenas estenoses fisiologicamente significativas foi inseguro, mas reduziu o custo e eventos cardiacos adversos a longo prazo.","Guiar o procedimento tratando apenas estenoses fisiologicamente significativas, ao inves de guiar pela aparencia angiografica, foi seguro e reduziu o custo e eventos cardiacos adversos a curto prazo.","Guiar o procedimento tratando apenas estenoses fisiologicamente significativas, ao inves de guiar pela aparencia angiografica, foi seguro e reduziu o custo e eventos cardiacos adversos a longo prazo."],ans:2},
  {n:30,tags:["Cateterismo","RFF"],q:"Sobre a RFF em discriminar o significado funcional de estenoses coronarias epicardicas, aceite como CORRETO o item:",opts:["A avaliacao de estenoses angiograficamente intermediarias (< 90%) representa um desafio do cotidiano e e uma das indicacoes mais bem estabelecidas para uso clinico da RFF.","A avaliacao de estenoses angiograficamente intermediarias (> 60% e < 90%) representa um desafio do cotidiano e e uma das indicacoes mais bem estabelecidas para uso clinico da RFF.","A avaliacao de estenoses angiograficamente intermediarias (> 40% e < 70%) representa um desafio do cotidiano e e uma das indicacoes mais bem estabelecidas para uso clinico da RFF.","A avaliacao de estenoses angiograficamente intermediarias (> 50% e < 70%) representa um desafio do cotidiano e e uma das indicacoes mais dificilmente estabelecidas para uso clinico da RFF."],ans:2},
  {n:31,tags:["Cateterismo cardiaco","BRE"],q:"Paciente 52 anos, piloto de aviacao comercial, dor retroesternal em aperto ao caminhar em esteira, melhora em 3 minutos com pausa. Quadro estavel ha 3 meses. HAS, tabagista. ECG com bloqueio de ramo esquerdo. PA = 140x90 mmHg. Qual teste e o mais adequado?",opts:["Coronariografia.","Teste ergometrico.","Ecocardiograma de estresse com dipiridamol.","Escore de calcio pela tomografia computadorizada."],ans:0},
  {n:32,tags:["Cirurgia de revascularizacao"],q:"Paciente de 65 anos, diabetico, dor toracica ha 30 dias. Cateterismo: lesao grave em arteria descendente anterior, lesao grave em arteria descendente posterior e lesao grave em primeiro ramo marginal.\n\nJulgue: Se o caso foi passivel de cirurgia, pode-se utilizar a arteria radial como um dos enxertos.",opts:["Certo.","Errado."],ans:0},
  {n:33,tags:["Cirurgia de revascularizacao","Angioplastia"],q:"Mesmo paciente da questao 32 (diabetico, 65 anos, lesao grave em descendente anterior, descendente posterior e primeiro ramo marginal).\n\nJulgue: Obrigatoriamente se deve tratar esse paciente por via cirurgica.",opts:["Certo.","Errado."],ans:1},
  {n:34,tags:["Cirurgia de revascularizacao","Indicacoes"],q:"Em qual cenario clinico a cirurgia de revascularizacao do miocardio e melhor em termos de mortalidade do que tratamento percutaneo?",opts:["Paciente com insuficiencia cardiaca e FE do VE inferior a 35% com lesao severa de tronco de coronaria esquerda.","Paciente com angina estavel cronica.","Paciente com estenose de 50% na arteria descendente anterior sem isquemia ao teste funcional.","Paciente com estenose de 60% na arteria descendente anterior.","Paciente com infarto agudo do miocardio com 72 horas de evolucao."],ans:0},
  {n:35,tags:["Prevencao secundaria","Estatinas"],q:"Homem, 76 anos, HAS, dislipidemia, infarto previo com angioplastia, dor toracica tipica ao caminhar um quarteirao. Em relacao a prevencao secundaria, assinale a alternativa INCORRETA:",opts:["AAS esta sempre indicado, na dose de 75 a 162 mg ao dia, salvo contraindicacoes.","Na doenca coronariana, recomenda-se manter LDL-C para niveis inferiores a 130 mg/dL.","Betabloqueadores estao indicados, salvo contraindicacoes.","Indicacao de IECA nao esta limitada a pacientes com disfuncao ventricular esquerda, hipertensao arterial ou diabetes mellitus.","Nao ha estudos demonstrando aumento de sobrevida com uso de nitratos orais."],ans:1},
  {n:36,tags:["Angioplastia coronariana","Stent farmacologico"],q:"Homem, 65 anos, HIV+, tabagista 50 macos-ano, hipertenso, diabetico tipo 2. Submetido a colocacao de stent farmacologico em coronaria descendente anterior. Assinale a melhor alternativa:",opts:["Neste caso, a escolha do stent esta associada a uma menor taxa de trombose cronica do stent.","Por se tratar de um stent farmacologico, pode-se optar pela antiagregacao plaquetaria simples, com AAS apenas.","A trombose de stent tardia e mais rara, mas um pouco mais comum com stents farmacologicos; deve-se proceder com antiagregacao plaquetaria dupla por ate 1 ano ou mais.","A trombose de stent tardia e mais rara, mas um pouco mais comum com stents metalicos; deve-se proceder com antiagregacao plaquetaria dupla por ate 1 ano ou mais.","A reestenose do stent e menor com o stent metalico, pois ha menor crescimento da neointima sobre esse stent."],ans:2},
  {n:37,tags:["Exames complementares","BRE"],q:"Paciente de 70 anos, angina pectoris tipica, IAM ha 7 anos, dor retroesternal ha 4 meses. Em uso de antiadesivo plaquetario, isossorbida e betabloqueador. Exame fisico normal, apenas bloqueio de ramo esquerdo no ECG de repouso. Qual o melhor exame para avaliar o quadro clinico?",opts:["Ecocardiograma com stress farmacologico.","Cateterismo cardiaco.","Ressonancia nuclear magnetica do miocardio.","Cintilografia perfusional miocardica.","Teste ergometrico."],ans:1},
  {n:38,tags:["Aterosclerose subclínica"],q:"Em relacao ao diagnostico de Doenca Aterosclerotica Coronariana Subclínica, marque a opcao INCORRETA:",opts:["A identificacao de individuos assintomaticos portadores de aterosclerose e fundamental para instituirem-se medidas de tratamento e prevencao secundaria.","Diante da complexidade dessas interacoes, a atribuicao intuitiva do risco frequentemente resulta em subestimacao ou superestimacao dos casos.","Diversos algoritmos tem sido criados com base em analises de regressao de estudos populacionais, por meio dos quais a identificacao do risco global e substancialmente aprimorada.","A nao identificacao de individuos assintomaticos portadores de aterosclerose e de pouca importancia em termos de prevencao secundaria."],ans:3},
  {n:39,tags:["Probabilidade pre-teste","Exames complementares"],q:"Paciente feminina, 45 anos, hipertensa, ex-tabagista, dor toracica precordial em queimacao que irradia para o pescoco ao esforco moderado nos ultimos 3 meses, duracao ~5 minutos, melhora espontanea. ECG realizado (mostrado na questao). Qual exame deve ser realizado como proximo passo na investigacao?",opts:["Teste ergometrico.","Tomografia coronaria com escore de calcio.","Cateterismo com coronariografia diagnostica.","Cintilografia miocardica de estresse farmacologico."],ans:3},
  {n:40,tags:["Dor toracica","Diagnostico diferencial"],q:"Correlacione corretamente as caracteristicas da dor toracica com as respectivas doencas:\n\nI. Dor retroesternal irradiando para cervical/mandibula/ombros/bracos (mais a esquerda), em opressao/queimacao/aperto, 2-10 min, desencadeada por esforco/frio/stress, aliviada pelo repouso.\nII. Dor sobre o esterno ou apice cardiaco, tipo 'facada', irradia para pescoco/ombro esquerdo, piora com inspiracao profunda ou rotacao do torax, alivia com inclinacao anterior.\nIII. Dor toracica anterior irradiando para o dorso, lancinante, inicio subito, geralmente com HAS ou Sindrome de Marfan.\nIV. Dor subesternal ou localizada, pleuritica ou em opressao, inicio subito, duracao < 1 hora, piora com respiracao.\n\n(A=Pericardite, B=Angina pectoris, C=Embolia pulmonar, D=Disseccao aortica)",opts:["I-A, II-B, III-C e IV-D.","I-B, II-A, III-D e IV-C.","I-C, II-D, III-A e IV-B.","I-D, II-C, III-B e IV-A."],ans:1},
  {n:41,tags:["Indicacoes de revascularizacao"],q:"Mulher, 58 anos, diabetica tipo 2, angina aos esforcos. Cintilografia positiva para isquemia. Cateterismo: obstrucao de 90% na descendente anterior, 70% na circunflexa e 80% na coronaria direita. Em uso de AAS, atenolol, atorvastatina, nitrato SN. Qual o tratamento de escolha?",opts:["Angioplastia com stent farmacologico nas 3 arterias.","Revascularizacao cirurgica do miocardio.","Intervencao hibrida (RM cirurgica + angioplastia).","Associar anticoagulante."],ans:1},
  {n:42,tags:["Probabilidade pre-teste","ECG"],q:"Homem de 50 anos, dor toracica retroesternal em peso a moderados esforcos que melhora com repouso, ha 6 meses. Obesidade, dislipidemia, tabagismo 20 anos/maco. ECG: depressao de 1 mm no segmento ST de toda parede anterior. Assinale a alternativa correta:",opts:["Deve-se solicitar cintilografia de perfusao miocardica com estresse farmacologico, para diagnostico de sindrome coronariana aguda.","O teste ergometrico pode ser utilizado para diagnostico, mesmo que ele apresente depressao menor ou igual a 1 mm do segmento ST no eletrocardiograma.","Ate o diagnostico definitivo, deve-se prescrever betabloqueadores pelo aumento da perfusao em areas isquemicas e por sua propriedade vasodilatadora na angina variante (Prinzmetal).","Inibidores da COX-1 concomitante ao uso de bloqueadores do receptor plaquetario P2Y12 podem ser prescritos, pois apresentam baixo risco de sangramento."],ans:1},
  {n:43,tags:["Cateterismo cardiaco","Teste ergometrico de alto risco"],q:"Paciente de 64 anos, hipertenso, dislipidemia e tabagista, dor anginosa tipica ha 5 meses. Teste ergometrico (Bruce): atingiu FC maxima prevista; infrdesnivelamento do ST de 2,0 mm que permaneceu por 7 minutos; dificuldade de elevar a pressao arterial; discreto desconforto precordial no pico do esforco. Qual seria o proximo exame a ser solicitado?",opts:["Cintilografia miocardica.","Cateterismo cardiaco.","Nao solicitaria qualquer exame e encaminharia direto para cirurgia de revascularizacao miocardica.","Nao solicitaria qualquer exame e iniciaria tratamento clinico medicamentoso."],ans:1},
  {n:44,tags:["Anamnese","Dor toracica"],q:"Mulher de 82 anos, hipertensa ha 20 anos, refere aparecimento de dor retroesternal em 'peso' ha 4 meses, que se instala ao iniciar a caminhada matinal habitual de 1 km, mas que as vezes melhora espontaneamente, sem precisar parar o exercicio. Essa dor toracica tem a seguinte origem e causa:",opts:["Cardiaca / isquemia miocardica.","Pulmonar / enfisema.","Psicogenica / ansiedade.","Gastrintestinal / espasmo esofagico."],ans:0},
  {n:45,tags:["Drogas preventivas","Drogas antiisquemicas"],q:"Paciente com dor anginosa aos esforcos ha 2 meses, sem mudanca nas caracteristicas da dor. Sem dor no momento da consulta. ECG de repouso normal. Qual a melhor conduta?",opts:["Prescricao de anticoagulacao com warfarina e inicio de aspirina.","Prescricao de betabloqueador, nitrato e aspirina.","Realizacao imediata de cateterismo cardiaco.","Observacao ambulatorial, sem tratamento."],ans:1},
  {n:46,tags:["Fisiopatologia","Cascata isquemica"],q:"Dentre os eventos a seguir, qual e o PRIMEIRO a ser evidenciado num quadro de isquemia miocardica?",opts:["Alteracoes da contratilidade miocardica.","Alteracoes eletrocardiograficas.","Alteracoes das enzimas cardiacas.","Sintoma de angina."],ans:0},
  {n:47,tags:["Angioplastia coronariana","SYNTAX score"],q:"Qual a situacao em que NAO esta indicada a angioplastia transluminal coronaria no tratamento da DAC estavel?",opts:["Lesao de tronco de coronaria esquerda e escore SYNTAX < 22.","Lesao de tronco de coronaria esquerda e escore SYNTAX > 32.","Lesao proximal unica de arteria descendente anterior.","Lesao de dois vasos coronarios proximais com risco cirurgico alto.","Lesao de tres vasos coronarios e escore SYNTAX < 22."],ans:1},
  {n:48,tags:["DAC estavel","Tratamento"],q:"Homem, 47 anos, hipertenso e dislipidemia, desconforto toracico em aperto a grandes esforcos que melhora com repouso. Sobre esse caso, assinale a alternativa CORRETA:",opts:["Em pacientes com suspeita de angina, e importante nao so fazer o diagnostico, mas tambem estabelecer o prognostico.","O tratamento de angina deve incluir mudanca de estilo de vida e farmacoterapia que reduzam o risco cardiovascular, incluindo anti-hipertensivos e hipolipemiantes.","Medicacoes antianginosas padrao incluem betabloqueadores, nitratos de longa duracao e bloqueadores de canais de calcio.","O alivio dos sintomas devera ser reavaliado novamente, apos duas semanas do inicio da terapia.","A estrategia invasiva e uma opcao obrigatoria para aqueles que respondem a terapia farmacologica."],ans:0},
  {n:49,tags:["Anamnese","Angina tipica"],q:"Medico escreveu na evolucao que o paciente possuia uma 'dor precordial anginosa tipica'. Dentre as caracteristicas abaixo, qual NAO foi citada pelo paciente?",opts:["Tinha a caracteristica de ser em queimacao e, eventualmente, em pontadas.","Era iniciada com o aumento da atividade fisica.","Melhorava com o repouso e quando o paciente usava nitrato sublingual.","Era acompanhada de mal-estar, nauseas e, as vezes, de sudorese fria."],ans:0},
  {n:50,tags:["Drogas preventivas"],q:"Qual a classe anti-hipertensiva de escolha em um paciente com angina estavel?",opts:["Bloqueadores de canal de calcio.","Beta-bloqueadores.","Diureticos.","Bloqueadores alfa-adrenergicos.","Inibidores da enzima conversora de angiotensina."],ans:1},
  {n:51,tags:["Tratamento farmacologico","Nitratos"],q:"Paciente de 64 anos, dor toracica constritiva a moderados esforcos, irradiacao para MSE, alivia com repouso. HAS e dislipidemia, em uso de valsartana e rosuvastatina. Em relacao ao tratamento, assinale a assertiva INCORRETA:",opts:["Os betabloqueadores reduzem a demanda de oxigenio do miocardio, por inibicao da contratilidade, da pressao arterial e da frequencia cardiaca.","Os nitratos de longa duracao devem ser utilizados de forma a atingir niveis plasmaticos adequados nas 24 horas, evitando assim efeito rebote.","Os nitratos melhoram os sintomas, pois reduzem a necessidade de oxigenio do miocardio e causam vasodilatacao coronariana.","Os bloqueadores do canal de calcio sao tao eficazes quanto os betabloqueadores no tratamento da condicao.","Em caso de alergia ao AAS, o clopidogrel pode ser utilizado."],ans:1},
  {n:52,tags:["Cirurgia de revascularizacao"],q:"Sobre o risco da cirurgia de revascularizacao do miocardio, assinale a afirmacao correta:",opts:["A aspirina e um eficiente de prevencao primaria da doenca coronariana nas mulheres.","Drogas hipolipemiantes sao menos eficazes em mulheres que em homens como metodo de prevencao primaria e secundaria da doenca coronariana.","Diagnostico de diabetes melito e niveis de HDL plasmatico sao fatores de risco mais importantes para homens que para mulheres, no que se refere a doenca coronariana.","Niveis sericos elevados de triglicerideos constituem fator de risco independente para doenca coronariana.","Todas as alternativas anteriores."],ans:3},
  {n:53,tags:["Isquemia silenciosa","Tratamento"],q:"Apos a confirmacao diagnostica da isquemia cardiaca silenciosa (assintomatica), considere as afirmativas:\n1. Deve-se optar por tratamento 'agressivo' da hipertensao arterial e dislipidemia;\n2. Deve ser considerado na abordagem: idade do paciente, profissao e seu historico medico;\n3. Deve-se levar em conta a magnitude e numero de zonas isquemicas demonstradas nos exames;\n4. A administracao de aspirina, estatinas e betabloqueadores com tratamento dos fatores de risco nao tem mudado o prognostico e risco de infarto.\n\nAssinale a alternativa CORRETA:",opts:["Somente as afirmativas 1 e 2 sao verdadeiras.","Somente as afirmativas 2, 3 e 4 sao verdadeiras.","Somente as afirmativas 1, 2 e 3 sao verdadeiras.","Somente as afirmativas 1 e 4 sao verdadeiras.","Somente as afirmativas 2 e 3 sao verdadeiras."],ans:2},
  {n:54,tags:["Drogas preventivas","Conduta"],q:"Mulher de 60 anos, dislipidemica, com sobrepeso, iniciou atividade fisica. Apos 30 minutos de caminhada sente dor toracica irradiada para MSE com duracao de 5 minutos que cessa com repouso. Foi medicada com AAS, betabloqueador, estatina e isossorbida SL. Teste de esforco positivo para isquemia. No retorno, referiu melhora, mas apresentou a mesma dor ao subir uma ladeira. PA = 130x80 mmHg, FC = 80 bpm. A proxima conduta e:",opts:["Otimizar betabloqueador.","Solicitar cateterismo cardiaco.","Prescrever nitrato oral 2 vezes ao dia.","Associar clopidogrel."],ans:0},
  {n:55,tags:["Drogas preventivas","Primeira linha"],q:"Para o tratamento da doenca cardiaca isquemica estavel, sao consideradas drogas de primeira linha para a reducao dos episodios de angina e melhora da tolerancia aos esforcos:",opts:["Nitratos.","Bloqueadores de canal de calcio.","Hidralazina com nitrato.","Betabloqueadores.","Bloqueadores de receptor de aldosterona."],ans:3},
  {n:56,tags:["DAC estavel","Definicao de angina"],q:"Sobre a definicao e caracteristicas da angina, analise as sentencas (V=Verdadeira, F=Falsa):\n\n( ) A angina e uma sindrome clinica caracterizada por dor ou desconforto em: torax, epigastrio, mandibula, ombro, dorso ou membros superiores;\n( ) Pacientes com coronarias normais e isquemia miocardica relacionada ao espasmo ou disfuncao endotelial tambem podem apresentar angina;\n( ) A angina usualmente acomete portadores de DAC com comprometimento de, pelo menos, uma arteria epicardica.\n\nA sequencia CORRETA e:",opts:["V - F - V.","V - V - V.","F - V - F.","V - F - F."],ans:1},
  {n:57,tags:["Cirurgia de revascularizacao"],q:"Paciente masculino, 66 anos, diabetico, com indicacao de revascularizacao cirurgica por doenca aterosclerotica triarterial (coronaria direita ocluida no terco proximal, IVA e circunflexa com 80% de oclusao no terco proximal) e escore SYNTAX = 25. Quanto ao planejamento cirurgico e cuidados no pos-operatorio:",opts:["Fibrilacao atrial e complicacao rara nesse tipo de cirurgia.","Se possivel, a arteria mamaria interna esquerda deve ser preferida para a anastomose com a arteria interventricular anterior.","O acesso cirurgico mais comumente usado para esse tipo de cirurgia e a toracotomia anterior esquerda.","Se forem usados enxertos de veias safenas, deve-se evitar o uso de AAS no primeiro dia de pos-operatorio, pelo risco de sangramento."],ans:1},
  {n:58,tags:["Cirurgia de revascularizacao","Indicacoes"],q:"Com relacao aos criterios anatomicos e clinicos, existe indicacao para a cirurgia de revascularizacao miocardica nos pacientes:",opts:["Com lesoes coronarias acima de 70% em tres vasos e com disfuncao ventricular (FE < 50%).","Assintomaticos e com lesao de 40% do tronco da coronaria esquerda.","Sintomaticos em vigencia de infarto agudo do miocardio.","Sintomaticos com lesao de 90% na coronaria direita.","Assintomaticos com lesao de 80% na coronaria circunflexa."],ans:0},
  {n:59,tags:["Cintilografia","Cardiomiopatia isquemica"],q:"Homem de 56 anos, diabetes e HAS, dispneia ao esforco. Nega dor toracica. Exame: turgencia jugular sentado, galope B4, estertores bibasais, edema de tornozelos bilateral. ECG: ritmo sinusal, FC 80 bpm. Ecocardiografia: FE do VE de 25% e acinesia da parede anterior. Cateterismo: DAC de tres vasos com leitos distais adequados para cirurgia. Sobre a cardiomiopatia isquemica, e CORRETO afirmar que:",opts:["A cirurgia de revascularizacao do miocardio e superior a terapia clinica somente se houver presenca de angina.","A cirurgia de revascularizacao do miocardio melhora a qualidade de vida e sobrevida mais do que a terapia clinica apenas se > 50% do miocardio demonstrar-se viavel.","O miocardio atordoado refere-se a disfuncao contradel persistente, causada por fluxo sanguineo coronariano cronicamente reduzido.","Reconstrucao ventricular cirurgica com aneurismectomia deve ser realizada juntamente com a revascularizacao cirurgica, pois a parede anterior e a acinetica.","O ecocardiograma ou a cintilografia com dobutamina poderiam diferenciar infarto de parede anterior de hibernacao do miocardio."],ans:4},
  {n:60,tags:["Diagnostico diferencial"],q:"Assinale a alternativa que contenha, apenas, patologias que sao diagnosticos diferenciais de infarto agudo do miocardio:",opts:["Pericardite, derrame pericardico, amigdalite, traqueobronquite.","Disseccao aguda de aorta, colecistopatia, pancreatite, infeccao do trato urinario.","Disseccao aguda de aorta, colecistopatia, pancreatite, pneumotorax, pneumonia, traumatismo cranioencefalico.","Disseccao aguda de aorta, espasmo de esofago, pneumotorax, pancreatite, patologias da coluna vertebral.","Cisto de ovario roto, litiase biliar e Aneurisma da veia da Galeno."],ans:3},
  {n:61,tags:["Avaliacao ambulatorial","DAC estavel"],q:"Homem de 55 anos, diabetes, hipertensao, hiperlipidemia e tabagista, com dois meses de dor toracica a esforcos com piora progressiva. Qual dos procedimentos diagnosticos e o mais apropriado?",opts:["Teste ECG de esforco","Cintilografia de perfusao miocardica com adenosina","Ecocardiograma de estresse com dobutamina","PET scan cardiaco","Cateterizacao cardiaca"],ans:4},
  {n:62,tags:["Teste ergometrico","Prognostico"],q:"Paciente de 50 anos, obeso, tabagista e sedentario, realizou teste ergometrico interrompido no estagio II por fadiga e dor toracica. Que outro achado indicaria sinal de prognostico adverso importante?",opts:["Taquicardia sinusal apos o esforco.","Reducao da pressao arterial durante o esforco.","Aumento da pressao arterial durante o esforco.","Depressao de ate 0,03 milivolt do segmento ST."],ans:1},
  {n:63,tags:["Anamnese","Fatores de risco equivalentes"],q:"Sao considerados fatores de risco para DAC, equivalentes a presenca de doenca coronaria estabelecida, as alteracoes abaixo, EXCETO:",opts:["Doenca arterial carotidea sintomatica.","Aneurisma de aorta abdominal.","Hipertensao arterial sistemica.","Diabetes mellitus.","Doenca arterial periferica."],ans:2},
  {n:64,tags:["Cateterismo cardiaco","CRM vs ICP"],q:"As cirurgias abertas de revascularizacao tem resultados superiores aos procedimentos percutaneos em lesoes obstrutivas de:",opts:["Circunflexa.","Coronaria direita.","Tronco de coronaria esquerda.","Terco distal de descendente anterior."],ans:2},
  {n:65,tags:["Nefropatia por contraste","Cateterismo"],q:"Paciente diabetico tipo II, 55 anos, dor toracica a medios esforcos. Teste ergometrico sugestivo de isquemia miocardica. Em uso de AAS 81 mg/dia, metformina 1,7 g/dia, sinvastatina 20 mg/dia, hidroclorotiazida 40 mg/dia e enalapril 20 mg/dia. Fara cateterismo coronariano em 2 dias. Qual dos seguintes procedimentos e imprescindivel?",opts:["Suspender AAS imediatamente","Suspender metformina imediatamente","Suspender sinvastatina imediatamente","Suspender anti-hipertensivos imediatamente","Suspender todos os medicamentos imediatamente"],ans:1},
  {n:66,tags:["DAC estavel","AAS"],q:"Qual a dose do acido acetilsalicilico atualmente aceita como adequada para o tratamento da angina estavel?",opts:["DE 75 mg A 325 mg.","DE 100 mg A 800 mg.","DE 81 A 1000 mg.","DE 325 A 500 mg.","Todas as respostas acima estao corretas."],ans:0}
];

var questions, answers, choices, cur, mode;

function init() {
  questions = ALL.slice();
  answers = [];
  choices = [];
  cur = 0;
  mode = 'quiz';
  for (var i = 0; i < questions.length; i++) { answers.push(null); choices.push(null); }
  render();
}

function render() {
  var q = questions[cur];
  var L = ['A','B','C','D','E','F'];
  document.getElementById('qnum').innerHTML = 'Questao ' + q.n;
  document.getElementById('qtags').innerHTML = q.tags.join(' &middot; ');
  document.getElementById('qtext').textContent = q.q;

  var optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = L[i] + ')  ' + q.opts[i];
    var answered = answers[cur] !== null;
    var isCorrect = i === q.ans;
    var userChose = choices[cur] === i;
    if (answered) {
      btn.disabled = true;
      if (userChose && answers[cur] === true)  btn.className = 'opt correct';
      if (userChose && answers[cur] === false) btn.className = 'opt wrong';
      if (!userChose && isCorrect) btn.className = 'opt reveal';
    } else if (mode === 'study' && isCorrect) {
      btn.className = 'opt reveal';
    }
    if (!answered) {
      (function(idx) { btn.onclick = function() { choose(idx); }; })(i);
    }
    optsEl.appendChild(btn);
  }

  var fb = document.getElementById('feedback');
  if (answers[cur] !== null) {
    fb.className = answers[cur] ? 'ok' : 'err';
    fb.textContent = answers[cur]
      ? 'Correto! Alternativa ' + L[q.ans] + '.'
      : 'Incorreto. A resposta correta e a alternativa ' + L[q.ans] + '.';
  } else {
    fb.className = '';
    fb.style.display = 'none';
  }

  var answered2 = 0; var score = 0;
  for (var j = 0; j < answers.length; j++) {
    if (answers[j] !== null) answered2++;
    if (answers[j] === true) score++;
  }
  var pct = Math.round((answered2 / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('info-left').textContent = 'Questao ' + (cur + 1) + ' de ' + questions.length;
  document.getElementById('info-right').textContent = 'Acertos: ' + score + '  |  Respondidas: ' + answered2;

  document.getElementById('prev-btn').disabled = (cur === 0);
  var isLast = cur === questions.length - 1;
  document.getElementById('next-btn').style.display = isLast ? 'none' : '';
  document.getElementById('fin-btn').style.display = isLast ? '' : 'none';

  renderDots();
}

function renderDots() {
  var el = document.getElementById('dots');
  el.innerHTML = '';
  for (var i = 0; i < questions.length; i++) {
    var d = document.createElement('button');
    d.className = 'dot';
    d.textContent = questions[i].n;
    if (i === cur) d.className = 'dot active';
    else if (answers[i] === true)  d.className = 'dot ok';
    else if (answers[i] === false) d.className = 'dot err';
    (function(idx) { d.onclick = function() { cur = idx; render(); }; })(i);
    el.appendChild(d);
  }
}

function choose(idx) {
  if (answers[cur] !== null) return;
  choices[cur] = idx;
  answers[cur] = (idx === questions[cur].ans);
  render();
}

function go(dir) {
  cur = cur + dir;
  if (cur < 0) cur = 0;
  if (cur >= questions.length) cur = questions.length - 1;
  render();
}

function setMode(m) {
  mode = m;
  document.getElementById('mb-quiz').className  = 'mbtn' + (m === 'quiz'  ? ' active' : '');
  document.getElementById('mb-study').className = 'mbtn' + (m === 'study' ? ' active' : '');
  render();
}

function shuffleQ() {
  var arr = [];
  for (var i = 0; i < questions.length; i++) {
    arr.push({ q: questions[i], a: answers[i], c: choices[i] });
  }
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  questions = []; answers = []; choices = [];
  for (var i = 0; i < arr.length; i++) {
    questions.push(arr[i].q);
    answers.push(arr[i].a);
    choices.push(arr[i].c);
  }
  cur = 0;
  render();
}

function showResults() {
  var ok = 0; var err = 0; var skip = 0;
  for (var i = 0; i < answers.length; i++) {
    if (answers[i] === true)  ok++;
    else if (answers[i] === false) err++;
    else skip++;
  }
  var pct = Math.round((ok / questions.length) * 100);
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('res-score').textContent = ok + '/' + questions.length;
  document.getElementById('res-pct').textContent = pct + '% de aproveitamento';
  document.getElementById('r-ok').textContent   = ok;
  document.getElementById('r-err').textContent  = err;
  document.getElementById('r-skip').textContent = skip;
  var medal = '📚';
  if (pct >= 90) medal = '🏆';
  else if (pct >= 70) medal = '🥇';
  else if (pct >= 50) medal = '🥈';
  document.getElementById('medal').textContent = medal;
}

function restart() {
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  init();
}

init();
</script>
